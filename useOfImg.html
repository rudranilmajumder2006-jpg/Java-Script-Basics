    <div id="msgPrint">

<script>
    document.querySelector("img").addEventListener('click', function(e){
        // console.log("x: "+e.clientX);
        // console.log("y: "+e.clientY);
        let xAxis = e.clientX >= 44 && e.clientX <=136
        let yAxis = e.clientY >= 216 && e.clientY <=266

let condition = xAxis && yAxis;
let msgPrint = document.getElementById("msgPrint");
if(condition){
    msgPrint.innerHTML = '<p style="color:blue; font-family:Algerian">PRICE IS &#8377;50,000/-</p>';
}
else{
    msgPrint.innerHTML =" ";
}

    })
