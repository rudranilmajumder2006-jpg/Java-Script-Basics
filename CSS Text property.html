<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <p>Hello World</p>
    </div>
    <button onclick="Change_color()">Change Color</button>
</body>
<script>
    function Change_color(){
        let p = document.querySelector("p");
        console.dir(p);

        p.style.cssText = "border:1px solid black; color : yellow;background-color: red; font-size:25px;font-weight:bold;display:flex;justify-content:center;padding:20px;"
    }
</script>
</html>
