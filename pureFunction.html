<script>
    const diameter = function(r){
        return 2*r;
    }
    const area = function(r){
        return (Math.PI*r*r).toFixed(2);
    }
    const circumference = function(r){
        return (2*Math.PI*r).toFixed(2);
    }

    const calculate = function(radius,logic){
        let output = [];
        for(let i=0;i<radius.length;i++){
            let result=logic(radius[i]);
            output.push(result);
        }
        return output;
    }

    const r = [1,3,5,7];

    console.log(calculate(r,diameter));
    console.log(calculate(r,area));
    console.log(calculate(r,circumference));

</script>
