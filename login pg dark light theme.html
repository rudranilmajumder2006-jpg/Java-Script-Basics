<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body class="container-fluid d-flex justify-content-center" style="height: 50vh; ">
    <form action="" class="w-25 border border-3 rounded p-4 bg-light text-dark" id="frmLogin">
        <div class="form-switch">
            <input type="checkbox" name=" " id="themeCheckBox" class="form-check-input">
            <span id="themeText">Dark Theme</span>
        </div>
        <h2><span class="bi bi-personal-fill"></span>User Login</h2>
        <dl>
            <dt>User Name</dt>
            <dd><input type="text" class="form-control"></dd>
            <dt>Password</dt>
            <dd><input type="password" class="form-control"></dd>
            <dl>
                <dt>Password</dt>
                <dd><input type="password" class="form-control"></dd>
            </dl>
            <button class="btn btn-dark w-100" id="btnLogin">Login</button>
        </dl>
    </form>

</body>
<script>
    const themeText = document.querySelector("#themeText");
    const checkbox = document.querySelector("#themeCheckBox");
    const frmLogin = document.querySelector("#frmLogin");
    const btnLogin = document.querySelector("#btnLogin");

    document.querySelector("#themeCheckBox").addEventListener('change',function(e){
        let condition = checkbox.checked;
        if(condition){
            themeText.textContent = 'Light Theme';
            frmLogin.className = 'w-25 border border-3 rounded p-4 bg-dark text-light';
            btnLogin.className = 'btn btn-light w-100';
        }
        else{
            themeText.textContent = 'Dark Theme';
            frmLogin.className = 'w-25 border border-3 rounded p-4 bg-light text-dark';
            btnLogin.className='btn btn-dark w-100';
        }
    })

</script>
</html>
