<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="main">
        <div class="item">Hi</div>
        <div class="item2">hello</div>
    </div>
    <button onclick="addItem()">Add Item</button>
</body>
<script>
function addItem(){
    let container = document.getElementsByClassName("main")[0];
    let p = document.createElement("p");
    let newitem = document.getElementById("item2");
    p.textContent = "rudra";
    p.className = "item3";
    container.insertBefore(p,newitem);
}
</script>
</html>
